<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — RightPhysio</title>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00C48C;
    --green-dark: #00A878;
    --green-deep: #065F46;
    --ink: #0D1F1A;
    --muted: #6B8A84;
    --surface: #F2FAF7;
    --border: #D4EDE6;
    --white: #FFFFFF;
    --error: #EF4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--surface);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  body::before {
    content: '';
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(circle at 20% 20%, rgba(0,196,140,0.12) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(0,196,140,0.08) 0%, transparent 50%);
    pointer-events: none;
  }

  .login-card {
    background: var(--white);
    border-radius: 24px;
    padding: 48px 44px;
    width: 100%;
    max-width: 440px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,196,140,0.1);
    position: relative;
    animation: slideUp 0.5s ease both;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo {
    text-align: center;
    margin-bottom: 32px;
  }

  .logo-text {
    font-family: 'Clash Display', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--ink);
  }

  .logo-text span { color: var(--green); }

  .logo-sub {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
  }

  .logo-icon {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, var(--green), var(--green-deep));
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
    font-size: 24px;
    box-shadow: 0 8px 20px rgba(0,196,140,0.3);
  }

  h2 {
    font-family: 'Clash Display', sans-serif;
    font-size: 22px; font-weight: 600;
    color: var(--ink); margin-bottom: 6px;
  }

  .subtitle {
    font-size: 14px; color: var(--muted);
    margin-bottom: 28px;
  }

  .form-group { margin-bottom: 18px; }

  .form-group label {
    display: block;
    font-size: 12px; font-weight: 600;
    color: var(--ink); margin-bottom: 7px;
    text-transform: uppercase; letter-spacing: 0.4px;
  }

  .form-group input {
    width: 100%; padding: 13px 16px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-size: 15px; font-family: 'Inter', sans-serif;
    color: var(--ink); background: var(--white);
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }

  .form-group input:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(0,196,140,0.1);
  }

  .form-group input::placeholder { color: #94a3b8; }

  .forgot {
    text-align: right; margin-top: -12px; margin-bottom: 20px;
  }

  .forgot a {
    font-size: 12px; color: var(--green);
    text-decoration: none; font-weight: 500;
  }

  .forgot a:hover { text-decoration: underline; }

  .login-btn {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--green), var(--green-dark));
    color: var(--white); border: none;
    border-radius: 12px; font-size: 15px;
    font-weight: 600; cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 15px rgba(0,196,140,0.3);
  }

  .login-btn:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(0,196,140,0.4);
  }

  .login-btn:disabled {
    opacity: 0.7; cursor: not-allowed; transform: none;
  }

  .error-msg {
    background: #FEF2F2; border: 1px solid #FECACA;
    border-radius: 10px; padding: 12px 14px;
    font-size: 13px; color: #991B1B;
    margin-bottom: 16px; display: none;
  }

  .error-msg.show { display: block; }

  .divider {
    text-align: center; margin: 24px 0;
    position: relative; color: var(--muted); font-size: 12px;
  }

  .divider::before {
    content: '';
    position: absolute; top: 50%; left: 0; right: 0;
    height: 1px; background: var(--border);
  }

  .divider span {
    background: var(--white); padding: 0 12px;
    position: relative;
  }

  .apply-link {
    text-align: center;
    font-size: 13px; color: var(--muted);
  }

  .apply-link a {
    color: var(--green); font-weight: 600;
    text-decoration: none;
  }

  .apply-link a:hover { text-decoration: underline; }

  .powered {
    text-align: center; margin-top: 28px;
    font-size: 11px; color: #94a3b8;
  }

  .powered a { color: #94a3b8; text-decoration: none; }
  .powered a:hover { color: var(--muted); }

  /* Loading spinner */
  .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: white; border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="login-card">
  <div class="logo">
    <div class="logo-icon">💚</div>
    <div class="logo-text">Right<span>Physio</span></div>
    <div class="logo-sub">Physiotherapist Portal</div>
  </div>

  <h2>Welcome back</h2>
  <p class="subtitle">Sign in to your RightPhysio dashboard</p>

  <div class="error-msg" id="errorMsg"></div>

  <div class="form-group">
    <label>Email Address</label>
    <input type="email" id="loginEmail" placeholder="your@email.com" autocomplete="email">
  </div>

  <div class="form-group">
    <label>Password</label>
    <input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password">
  </div>

  <div class="forgot">
    <a href="#" onclick="showForgot();return false;">Forgot password?</a>
  </div>

  <button class="login-btn" id="loginBtn" onclick="doLogin()">Sign In</button>

  <!-- Forgot Password Panel -->
  <div id="forgotPanel" style="display:none;margin-top:20px;background:#F0FBF7;border:1px solid var(--border);border-radius:14px;padding:20px">
    <div style="font-size:14px;font-weight:600;color:var(--ink);margin-bottom:12px">Reset Password</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:14px">Enter your registered email. We'll send a reset OTP.</div>
    <input type="email" id="forgotEmailInput" placeholder="your@email.com" style="width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:'Inter',sans-serif;outline:none;margin-bottom:10px">
    <div id="forgotOtpRow" style="display:none;margin-bottom:10px">
      <input type="text" id="forgotOtpInput" placeholder="Enter OTP from email" style="width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:'Inter',sans-serif;outline:none">
    </div>
    <div id="forgotNewPwRow" style="display:none;margin-bottom:10px">
      <input type="password" id="forgotNewPw" placeholder="New password (min 8 chars)" style="width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:'Inter',sans-serif;outline:none">
    </div>
    <div style="display:flex;gap:8px">
      <button id="forgotBtn" onclick="doForgot()" style="flex:1;padding:11px;background:var(--green);color:white;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif">Send OTP</button>
      <button onclick="hideForgot()" style="padding:11px 16px;background:transparent;border:1.5px solid var(--border);border-radius:10px;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;color:var(--muted)">Cancel</button>
    </div>
    <div id="forgotMsg" style="font-size:12px;margin-top:8px;color:var(--green-deep);display:none"></div>
  </div>

  <div class="divider"><span>New to RightPhysio?</span></div>

  <div class="apply-link">
    <a href="https://rightphysio.in/#join">Apply to join →</a>
  </div>

  <div class="powered">
    Powered by <a href="https://mediwhats.in" target="_blank">MediWhats</a> · AI Healthcare Platform
  </div>
</div>

<script>
var BACKEND = '/backend/api';

// If already logged in, redirect to dashboard
var existingToken = localStorage.getItem('rp_token');
if (existingToken) {
  window.location.href = '/dashboard';
}

document.getElementById('loginPassword').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});

function showError(msg) {
  var el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
}

function hideError() {
  document.getElementById('errorMsg').classList.remove('show');
}

var forgotStep = 'email'; // email → otp → newpw

function showForgot() {
  document.getElementById('forgotPanel').style.display = 'block';
  document.getElementById('forgotEmailInput').focus();
}

function hideForgot() {
  document.getElementById('forgotPanel').style.display = 'none';
  forgotStep = 'email';
  document.getElementById('forgotOtpRow').style.display = 'none';
  document.getElementById('forgotNewPwRow').style.display = 'none';
  document.getElementById('forgotBtn').textContent = 'Send OTP';
  document.getElementById('forgotMsg').style.display = 'none';
}

async function doForgot() {
  var btn = document.getElementById('forgotBtn');
  var msgEl = document.getElementById('forgotMsg');
  msgEl.style.display = 'none';

  if (forgotStep === 'email') {
    var email = document.getElementById('forgotEmailInput').value.trim();
    if (!email) { msgEl.textContent = 'Enter your email'; msgEl.style.color = '#991B1B'; msgEl.style.display = 'block'; return; }
    btn.disabled = true; btn.textContent = 'Sending...';
    try {
      var res = await fetch(BACKEND + '/auth/forgot-password', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ email })
      });
      var data = await res.json();
      msgEl.textContent = data.message || 'OTP sent to your email';
      msgEl.style.color = '#065F46'; msgEl.style.display = 'block';
      document.getElementById('forgotOtpRow').style.display = 'block';
      btn.textContent = 'Verify OTP';
      forgotStep = 'otp';
    } catch(e) {
      msgEl.textContent = 'Failed to send OTP. Try again.'; msgEl.style.color = '#991B1B'; msgEl.style.display = 'block';
    }
    btn.disabled = false;

  } else if (forgotStep === 'otp') {
    var otp = document.getElementById('forgotOtpInput').value.trim();
    var email = document.getElementById('forgotEmailInput').value.trim();
    if (!otp) { msgEl.textContent = 'Enter the OTP'; msgEl.style.color = '#991B1B'; msgEl.style.display = 'block'; return; }
    btn.disabled = true; btn.textContent = 'Verifying...';
    try {
      var res = await fetch(BACKEND + '/auth/verify-otp', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ email, otp })
      });
      var data = await res.json();
      if (data.success || data.token) {
        window._resetToken = data.token || data.resetToken || data.data && data.data.token;
        document.getElementById('forgotNewPwRow').style.display = 'block';
        btn.textContent = 'Reset Password';
        forgotStep = 'newpw';
        msgEl.textContent = 'OTP verified. Enter your new password.';
        msgEl.style.color = '#065F46'; msgEl.style.display = 'block';
      } else {
        msgEl.textContent = data.message || 'Invalid OTP'; msgEl.style.color = '#991B1B'; msgEl.style.display = 'block';
      }
    } catch(e) {
      msgEl.textContent = 'Verification failed.'; msgEl.style.color = '#991B1B'; msgEl.style.display = 'block';
    }
    btn.disabled = false;

  } else if (forgotStep === 'newpw') {
    var pw = document.getElementById('forgotNewPw').value;
    if (!pw || pw.length < 8) { msgEl.textContent = 'Password must be at least 8 characters'; msgEl.style.color = '#991B1B'; msgEl.style.display = 'block'; return; }
    btn.disabled = true; btn.textContent = 'Resetting...';
    try {
      var res = await fetch(BACKEND + '/auth/reset-password', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ token: window._resetToken, password: pw })
      });
      var data = await res.json();
      msgEl.textContent = 'Password reset! You can now sign in.';
      msgEl.style.color = '#065F46'; msgEl.style.display = 'block';
      setTimeout(function(){ hideForgot(); }, 2000);
    } catch(e) {
      msgEl.textContent = 'Reset failed. Try again.'; msgEl.style.color = '#991B1B'; msgEl.style.display = 'block';
    }
    btn.disabled = false;
  }
}

async function doLogin() {
  var email = document.getElementById('loginEmail').value.trim();
  var password = document.getElementById('loginPassword').value;
  var btn = document.getElementById('loginBtn');

  if (!email || !password) {
    showError('Please enter your email and password.');
    return;
  }

  hideError();
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Signing in...';

  try {
    var res = await fetch(BACKEND + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    var data = await res.json();

    // Unwrap nested data if needed
    var loginData = data.data || data;

    if (!loginData.token) {
      showError(loginData.message || data.message || 'Invalid email or password.');
      btn.disabled = false;
      btn.textContent = 'Sign In';
      return;
    }

    // Save session
    localStorage.setItem('rp_token', loginData.token);
    localStorage.setItem('rp_hospital_id', String(loginData.hospital_id || ''));
    localStorage.setItem('rp_user', JSON.stringify({
      first_name: loginData.first_name,
      last_name: loginData.last_name,
      email: loginData.email,
      role: loginData.role,
      userid: String(loginData.userid || ''),
      user_id: String(loginData.userid || '')
    }));
    localStorage.setItem('rp_login_data', JSON.stringify(loginData));

    btn.innerHTML = '✓ Redirecting...';

    // Redirect to dashboard
    window.location.href = '/dashboard';

  } catch(err) {
    showError('Connection error. Please try again.');
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}
</script>

</body>
</html>
